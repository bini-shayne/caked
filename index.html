<!doctype html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Birthday Cake 🎂</title>
	<link rel="shortcut icon" href="#">
	<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
	<style>
        body {
            font-size: 18px;
            font-family: 'Nunito', sans-serif;
            background-color: black;
            color: white;
        }

        button {
            font-size: 24px;
            font-family: 'Nunito', sans-serif;
            color: white;
            background-color: rgb(192, 11, 216);
            border: none;
            color: black;
            padding: 20px 40px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        #start {
            background-color: rgb(234, 13, 127);
            margin-top: 20px;
        }

        #startconsoledebug {
            background-color: rgb(247, 0, 255)
        }

        #stopconsoledebug {
            background-color: rgb(255, 0, 119)
        }

        #microphonestatus, #audiostatus, #recording {
            font-size: 36px;
            font-family: 'Nunito', sans-serif;
            background-color: black;
            color: white;
        }

        td, th {
            border: 1px solid;
            text-align: left;
            padding: 10px;
        }

        body {
            background-color: #cd7ab4;
        }

        .cake {
            position: absolute;
            width: 250px;
            height: 200px;
            top: 55%;
            left: 50%;
            margin-top: -70px;
            margin-left: -125px;
            transform: scale(1.3);
        }

        .plate {
            width: 270px;
            height: 110px;
            position: absolute;
            bottom: -10px;
            left: -10px;
            background-color: #ccc;
            border-radius: 50%;
            box-shadow: 0 2px 0 #b3b3b3, 0 4px 0 #b3b3b3, 0 5px 40px rgba(0, 0, 0, 0.5);
        }

        .cake > * {
            position: absolute;
        }

        .layer {
            position: absolute;
            display: block;
            width: 250px;
            height: 100px;
            border-radius: 50%;
            background-color: #551343;
            box-shadow: 0 2px 0px #8f0561, 0 4px 0px #8f0248, 0 6px 0px #c61391, 0 8px 0px #ff00d4, 0 10px 0px #c4065b, 0 12px 0px #2f220b, 0 14px 0px #2f210a, 0 16px 0px #2e200a, 0 18px 0px #2d200a, 0 20px 0px #2c1f0a, 0 22px 0px #2b1f0a, 0 24px 0px #2a1e09, 0 26px 0px #2a1d09, 0 28px 0px #291d09, 0 30px 0px #ff00c8;
        }

        .layer-top {
            top: 0px;
        }

        .layer-middle {
            top: 33px;
        }

        .layer-bottom {
            top: 66px;
        }

        .icing {
            top: 2px;
            left: 5px;
            background-color: #ed06a0;
            width: 240px;
            height: 90px;
            border-radius: 50%;
        }

        .icing:before {
            content: "";
            position: absolute;
            top: 4px;
            right: 5px;
            bottom: 6px;
            left: 5px;
            background-color: lab(54.71% 79.15 -17.34);
            box-shadow: 0 0 4px #d30a97, 0 0 4px #ce13bb, 0 0 4px #ff52d7;
            border-radius: 50%;
            z-index: 1;
        }

        .drip {
            display: block;
            width: 50px;
            height: 60px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            background-color: #e624ab;
        }

        .drip1 {
            top: 53px;
            left: 5px;
            transform: skewY(15deg);
            height: 48px;
            width: 40px;
        }

        .drip2 {
            top: 69px;
            left: 181px;
            transform: skewY(-15deg);
        }

        .drip3 {
            top: 54px;
            left: 90px;
            width: 80px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .candle {
            background-color: #b43ee2;
            width: 16px;
            height: 50px;
            border-radius: 8px / 4px;
            top: -20px;
            left: 50%;
            margin-left: -8px;
            z-index: 10;
        }

        .candle:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 16px;
            height: 8px;
            border-radius: 50%;
            background-color: #ad0393;
        }

        .flame {
            position: absolute;
            background-color: orange;
            width: 15px;
            height: 35px;
            border-radius: 10px 10px 10px 10px / 25px 25px 10px 10px;
            top: -34px;
            left: 50%;
            margin-left: -7.5px;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.5);
            transform-origin: 50% 90%;
            animation: flicker 1s ease-in-out alternate infinite;
        }

        @keyframes flicker {
            0% {
                transform: skewX(5deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.2), 0 0 20px rgba(255, 165, 0, 0.2), 0 0 60px rgba(255, 165, 0, 0.2), 0 0 80px rgba(255, 165, 0, 0.2);
            }
            25% {
                transform: skewX(-5deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.5);
            }
            50% {
                transform: skewX(10deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.3), 0 0 20px rgba(255, 165, 0, 0.3), 0 0 60px rgba(255, 165, 0, 0.3), 0 0 80px rgba(255, 165, 0, 0.3);
            }
            75% {
                transform: skewX(-10deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.4), 0 0 20px rgba(255, 165, 0, 0.4), 0 0 60px rgba(255, 165, 0, 0.4), 0 0 80px rgba(255, 165, 0, 0.4);
            }
            100% {
                transform: skewX(5deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.5);
            }
        }

        #cake-holder .cake-off {
            opacity: 0;
            transition: 1s ease-in all;
        }

        #cake-holder.done .cake-off {
            opacity: 1;
            transition: 1s ease-in all;
        }

        #cake-holder .cake .flame {
            opacity: 1;
            transition: 0.3s ease-in all;
        }

        #cake-holder.done .flame {
            opacity: 0;
        }

        .text-center {
            text-align: center;
            font-family: 'Nunito', sans-serif;
        }

        @media (max-width: 768px) {
            img.cake-off {
                width: 95vw !important;
                height: auto !important;
            }
        }

	</style>
</head>

<body class="text-center">
<h1><span style="font-family: 'Great Vibes', cursive; font-size: 1.2em; color: #ff69b4; text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493;">HAPPY</span> Birthday! 🎂</h1>
<p>(Blow on mic to blow the cake!)</p>
<br>
<button id="start">START (required on Chrome)</button>
<button style="display: none" id="startconsoledebug">enable console logs</button>
<button style="display: none" id="stopconsoledebug">disable console logs</button>
<br>
<br>
<audio id="birthday-audio" src="Jeremih - Birthday Sex (Lyrics).mp3" loop></audio>
<div id="cake-holder" style="opacity: 0; pointer-events: none;">
	<div class="cake">
		<div class="plate"></div>
		<div class="layer layer-bottom"></div>
		<div class="layer layer-middle"></div>
		<div class="layer layer-top"></div>
		<div class="icing"></div>
		<div class="drip drip1"></div>
		<div class="drip drip2"></div>
		<div class="drip drip3"></div>
		<div class="candle">
			<div class="flame"></div>
		</div>
	</div>
	<div class="text-center">
		<img class="cake-off" src="só-vem.gif" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: auto; height: auto; max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 10px; z-index: 100; transition: all 18s ease-in; pointer-events: none;" alt="Celebration GIF">
	</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="cake.js"></script>
<script src="volume-meter.js"></script>
<script src="audioDetectionConfig.js"></script>
<script src="audioDetection.js"></script>
<script src="audioStream.js"></script>

<script src="demoAudioRecorder.js"></script>
<script src="demoAudioDetectionListeners.js"></script>
<script src="demo.js"></script>
</body>
</html>
